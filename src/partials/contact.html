<!-- CONTACT v2 -->
<div class="flex flex-col xl:gap-12 lg:gap-10 md:gap-8 gap-6">

    <div>
        <span
            class="text-sm xl:px-3 px-2 py-1.5 text-neutral11/80 dark:text-neutral3/80 border-[0.5px] border-neutral3 dark:border-neutral3/60 rounded-full inline-block lg:mb-5 mb-3">
            CONTACT
        </span>
        <h2 class="text-h1 text-dark dark:text-light lg:mb-4 mb-3 cursor-effect-medium">
                Let's Get In Touch
        </h2>
        <p class="text-base lg:text-xl text-neutral11 dark:text-neutral2 font-thin">
            Fill out the form opportunities and I'll do my best to respond to your inquiry within 24
            hours.
        </p>
    </div>
    <form action="#" class="flex flex-col lg:gap-6 gap-4">
        <div class="flex md:flex-nowrap flex-wrap lg:gap-6 gap-4">
            <div class="flex flex-col lg:gap-3 gap-2 lg:w-1/2 w-full">
                <label class="text-neutral11 dark:text-neutral1 text-base font-thin">
                    FULL NAME *
                </label>
                <input type="text" name="name" placeholder="Your Full Name"
                    class="lg:py-3 py-2 lg:px-6 px-4 rounded-lg text-dark dark:text-light bg-transparent dark:bg-neutral11/50 border border-neutral5/60 dark:border-neutral11/80">
            </div>
            <div class="flex flex-col lg:gap-3 gap-2 lg:w-1/2 w-full">
                <label class="text-neutral11 dark:text-neutral1 text-base font-thin">
                    EMAIL ADDRESS *
                </label>
                <input type="email" name="email" placeholder="Your Email Address"
                    class="lg:py-3 py-2 lg:px-6 px-4 rounded-lg text-dark dark:text-light bg-transparent dark:bg-neutral11/50 border border-neutral5/60 dark:border-neutral11/80">
            </div>
        </div>
        <div class="flex md:flex-nowrap flex-wrap lg:gap-6 gap-4">
            <div class="flex flex-col lg:gap-3 gap-2 lg:w-1/2 w-full">
                <label class="text-neutral11 dark:text-neutral1 text-base font-thin">
                    PHONE NUMBER *
                </label>
                <input type="text" name="phone" placeholder="Your Phone Number"
                    class="lg:py-3 py-2 lg:px-6 px-4 rounded-lg text-dark dark:text-light bg-transparent dark:bg-neutral11/50 border border-neutral5/60 dark:border-neutral11/80">
            </div>
            <div class="flex flex-col lg:gap-3 gap-2 lg:w-1/2 w-full">
                <label class="text-neutral11 dark:text-neutral1 text-base font-thin">
                    SUBJECT *
                </label>
                <input type="text" name="subject" placeholder="Subject"
                    class="lg:py-3 py-2 lg:px-6 px-4 rounded-lg text-dark dark:text-light bg-transparent dark:bg-neutral11/50 border border-neutral5/60 dark:border-neutral11/80">
            </div>
        </div>
        <div class="flex flex-col lg:gap-3 gap-2">
            <label class="text-neutral11 dark:text-neutral1 text-base font-thin">
                MESSAGE *
            </label>
            <textarea name="message" placeholder="Write Your Message Here...." rows="5"
                class="lg:py-3 py-2 lg:px-6 px-4 rounded-lg text-dark dark:text-light bg-transparent dark:bg-neutral11/50 border border-neutral5/60 dark:border-neutral11/80"></textarea>
        </div>
        <button type="submit" class="btn w-full text-dark bg-primary hover:text-light">
            <span>Send Message</span>
        </button>
    </form>
</div>
